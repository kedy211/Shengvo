name: Shengvo
options:
  bundleIdPrefix: com.shengvo
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_NAME: Shengvo
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Shengvo:
    type: application
    platform: macOS
    sources:
      - path: Shengvo
        excludes:
          - "**/whisper.xcframework"
    dependencies:
      - framework: Shengvo/whisper.xcframework
        embed: true
    info:
      path: Shengvo/App/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: 晟语需要访问麦克风以录制语音进行识别。
    entitlements:
      path: Shengvo/Shengvo.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shengvo.app
        INFOPLIST_FILE: Shengvo/App/Info.plist
        ENABLE_HARDENED_RUNTIME: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: "$(SRCROOT)/Shengvo/Core/SQLite/sqlite_bridge.h"
        OTHER_LINKER_FLAGS: "-lsqlite3 -framework Speech"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Manual
