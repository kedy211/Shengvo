name: VoiceInput
options:
  bundleIdPrefix: com.voiceinput
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_NAME: Shengvo
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  VoiceInput:
    type: application
    platform: macOS
    sources:
      - path: VoiceInput
    info:
      path: VoiceInput/App/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: 晟语需要访问麦克风以录制语音进行识别。
    entitlements:
      path: VoiceInput/VoiceInput.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voiceinput.app
        INFOPLIST_FILE: VoiceInput/App/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
